name: Star ask on issue close

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  star-ask:
    if: github.event.issue.state_reason == 'completed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `✅ Closed as completed!\n\nIf DevTrack has been useful, a ⭐ [star on the repo](https://github.com/${context.repo.owner}/${context.repo.repo}) helps the project grow and reach more developers.`
            });
